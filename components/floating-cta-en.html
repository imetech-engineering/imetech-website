<!-- v2 Shared Floating CTA Component — loaded via JS into #floating-cta-container -->
<div class="floating-cta">
  <div class="floating-backdrop" hidden aria-hidden="true"></div>
  <div class="floating-panel" id="floating-contact-panel" role="dialog" aria-modal="true"
    aria-labelledby="floating-contact-title" hidden>
    <header class="floating-panel__header">
      <h2 class="floating-panel__title" id="floating-contact-title">Get in touch</h2>
      <button type="button" class="floating-panel__close" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
    </header>
    <div class="floating-panel__actions">
      <a href="tel:+31612385439" class="floating-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path
            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
        </svg>
        <span>Call</span>
      </a>
      <a href="https://www.linkedin.com/in/ivo-mengerink-30789b200/" target="_blank" rel="noopener noreferrer"
        class="floating-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z" />
          <rect x="2" y="9" width="4" height="12" />
          <circle cx="4" cy="4" r="2" />
        </svg>
        <span>LinkedIn</span>
      </a>
    </div>
    <p class="floating-panel__divider"><span>or send a message</span></p>
    <form class="form floating-panel__form" id="floatingContactForm" action="https://api.web3forms.com/submit"
      method="POST" novalidate>
      <input type="hidden" name="access_key" value="36fe41a3-1e8e-4282-a4d9-5d8ee89c7a64">
      <input type="hidden" name="subject" value="Contact via website widget">
      <input type="hidden" name="from_page" value="">
      <input type="checkbox" name="botcheck" class="hidden" style="display:none" tabindex="-1" aria-hidden="true">
      <div class="floating-panel__fields">
        <div class="form-group">
          <label for="floating-contact-name">Name</label>
          <input type="text" id="floating-contact-name" name="name" required class="input" placeholder="Your name"
            autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="floating-contact-email">Email</label>
          <input type="email" id="floating-contact-email" name="email" required class="input"
            placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="floating-contact-message">Message</label>
          <textarea id="floating-contact-message" name="message" required rows="2" class="input textarea"
            placeholder="Tell me about your project..."></textarea>
        </div>
      </div>
      <div class="floating-panel__foot">
        <button class="btn btn-primary floating-panel__submit" type="submit">
          Send message
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </button>
        <div id="floatingContactResult" class="form-result" style="display:none" role="status" aria-live="polite">
        </div>
      </div>
    </form>
    <p class="floating-panel__footer">
      <a href="/en/contact/">All contact details</a>
      ·
      <a href="/en/privacy-policy/">Privacy</a>
    </p>
  </div>
  <button type="button" class="floating-btn" aria-label="Get in touch" aria-controls="floating-contact-panel"
    aria-expanded="false">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      aria-hidden="true">
      <path
        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
    </svg>
  </button>
</div>
